services:
  api:
    build:
      context: ./build
      dockerfile: Dockerfile.php
    environment:
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE:-scuola}
      DB_USERNAME: ${DB_USERNAME:-scuola}
      DB_PASSWORD: ${DB_PASSWORD:-scuola}
    ports:
      - ${API_PORT:-8080}:80
    volumes:
      - ./php:/var/www/html
      - php_vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_DATABASE:-scuola}
      MARIADB_USER: ${DB_USERNAME:-scuola}
      MARIADB_PASSWORD: ${DB_PASSWORD:-scuola}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./build/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./build
      dockerfile: Dockerfile.node
    ports:
      - ${FRONTEND_PORT:-5173}:5173
    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    depends_on:
      - api

  phpmyadmin:
    image: phpmyadmin:5-apache
    profiles:
      - tools
    ports:
      - ${PHPMYADMIN_PORT:-8081}:80
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-scuola}
      PMA_PASSWORD: ${DB_PASSWORD:-scuola}
    depends_on:
      - db

volumes:
  mariadb_data:
  node_modules:
  php_vendor:
